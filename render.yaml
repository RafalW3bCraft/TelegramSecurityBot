        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: INDIVIDUAL_SCAN_PRICE
        sync: false
      - key: GROUP_SCAN_PRICE
        sync: false
      - key: INDIVIDUAL_SCAN_QUANTITY
        sync: false
      - key: GROUP_SCAN_QUANTITY
        sync: false
