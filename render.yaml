        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PGHOST
        sync: false
      - key: PGPORT
        sync: false
      - key: PGUSER
        sync: false
      - key: PGPASSWORD
        sync: false
      - key: PGDATABASE
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: URLHAUS_API_KEY
        sync: false
      - key: BTC_WALLET_ADDRESS
        sync: false
      - key: TRX_WALLET_ADDRESS
        sync: false
      - key: USDT_TRC20_WALLET_ADDRESS
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        sync: false
      - key: NOWNODES_API_KEY
        sync: false
      - key: BLOCKCYPHER_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: RENDER_URL
        sync: false
