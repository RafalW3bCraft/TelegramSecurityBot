        value: production
      - key: DEBUG
        value: "False"
      - key: PORT
        value: "5000"
      - key: AUTO_BLOCK_THRESHOLD
        sync: false
      - key: AUTO_BLOCK_ENABLED
        sync: false
      - key: API_RATE_LIMIT
        sync: false
      - key: GENERAL_RATE_LIMIT
        sync: false
      - key: CACHE_TTL
        sync: false
      - key: CACHE_ENABLED
